name = "cinewav-sync"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
account_id = "485628c2559954841ec8115a52230e54"

# Durable Object binding — one per show/event
[[durable_objects.bindings]]
name = "SHOW_ROOM"
class_name = "ShowRoom"

# Durable Object migration — required on first deploy
[[migrations]]
tag = "v1"
new_sqlite_classes = ["ShowRoom"]

# CORS origins — update with your actual deployed URLs
[vars]
ALLOWED_ORIGINS = "http://localhost:5173,http://localhost:5174,https://cinewav-master.pages.dev,https://cinewav-audience.pages.dev,https://*.cinewav-master.pages.dev,https://*.cinewav-audience.pages.dev"
