name: CI — Type Check & Build

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  check-worker:
    name: Worker — Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: worker/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec tsc --noEmit

  build-master:
    name: Master — Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: master
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: master/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  build-audience:
    name: Audience — Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: audience
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: audience/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
